name: FlyEasy Agent Crew

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run?'
        required: true
        type: choice
        options:
          - pm
          - architect
          - ui
          - backend
          - qa
        default: pm

permissions:
  contents: write        # ← ADD THIS — allows bot to push to repo

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← ADD THIS

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run selected agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          AGENT_TO_RUN: ${{ github.event.inputs.agent }}
          PYTHONPATH: ${{ github.workspace }}/agents
        run: python agents/main.py

      - name: Commit agent output to repo
        run: |
          git config --global user.name "FlyEasy Agents"
          git config --global user.email "agents@flyeasy.com"
          git add output/
          git diff --staged --quiet || git commit -m "feat: ${{ github.event.inputs.agent }} agent output"
          git push origin main    # ← explicit branch name
